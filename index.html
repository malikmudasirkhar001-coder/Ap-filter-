<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cam AI | Professional WebRTC</title>
    <style>
        /* Modern Dark Theme Design */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0f0f13;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .card {
            background: #1c1c24;
            width: 95%;
            max-width: 420px;
            padding: 30px 20px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 { font-size: 2rem; font-weight: 500; margin-bottom: 8px; letter-spacing: 0.5px; }
        p { color: #8a8a98; font-size: 0.85rem; margin-bottom: 25px; }

        /* Video Container (The Black Box) */
        .video-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #000000;
            border-radius: 25px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            border: 2px solid #3d5afe;
            box-shadow: 0 0 25px rgba(61, 90, 254, 0.3);
            transition: filter 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror Mode */
        }

        /* Snapchat Style Filter Shelf */
        .filter-label {
            font-size: 12px;
            color: #4d69ff;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
            font-weight: bold;
        }

        .filter-shelf {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 5px;
            margin-bottom: 30px;
            scrollbar-width: none; /* Firefox */
        }

        .filter-shelf::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .filter-item {
            min-width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
            transition: 0.3s all ease;
            background: #2a2a35;
            flex-direction: column;
            color: #ccc;
        }

        .filter-item.active {
            border-color: #4d69ff;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(77, 105, 255, 0.5);
            color: #fff;
            background: #3d5afe;
        }

        /* Action Button */
        .btn-launch {
            background: linear-gradient(135deg, #4d69ff, #3d5afe);
            color: white;
            border: none;
            width: 90%;
            padding: 18px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(77, 105, 255, 0.3);
        }

        .btn-launch:active { transform: scale(0.96); }
        
        .btn-launch:disabled {
            background: #28a745;
            box-shadow: none;
            cursor: default;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Pro Cam AI</h1>
        <p>Experience high-quality WebRTC streaming</p>

        <div class="video-container" id="videoWrapper">
            <video id="webcam" autoplay playsinline muted></video>
        </div>

        <span class="filter-label">Choose Filter</span>
        
        <div class="filter-shelf">
            <div class="filter-item active" onclick="applyFilter('none', this)">
                <span>Normal</span>
            </div>
            <div class="filter-item" onclick="applyFilter('grayscale(100%)', this)">
                <span>B&W</span>
            </div>
            <div class="filter-item" onclick="applyFilter('sepia(100%)', this)">
                <span>Retro</span>
            </div>
            <div class="filter-item" onclick="applyFilter('hue-rotate(180deg)', this)">
                <span>Neon</span>
            </div>
            <div class="filter-item" onclick="applyFilter('invert(100%)', this)">
                <span>X-Ray</span>
            </div>
            <div class="filter-item" onclick="applyFilter('contrast(200%) brightness(150%)', this)">
                <span>Vivid</span>
            </div>
        </div>

        <button class="btn-launch" id="startBtn" onclick="initCamera()">Launch Camera</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const videoWrapper = document.getElementById('videoWrapper');
        const startBtn = document.getElementById('startBtn');

        // Function to start camera with robust settings
        async function initCamera() {
            const constraints = {
                video: {
                    facingMode: "user",
                    width: { ideal: 1080 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                // Majboot Permission Request
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // UI Update
                startBtn.innerText = "Camera Active ✅";
                startBtn.disabled = true;
                
            } catch (err) {
                console.error("Camera Error:", err);
                if(err.name === "NotAllowedError") {
                    alert("⚠️ Browser ne camera block kiya hai. Please URL bar mein 'Lock' icon par click karke Permission Allow karein.");
                } else {
                    alert("⚠️ Camera access fail ho gaya. Check karein ke koi aur app camera use toh nahi kar rahi.");
                }
            }
        }

        // Function to apply filters
        function applyFilter(filterString, element) {
            // Remove active style from all
            document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
            
            // Add active style to selected
            element.classList.add('active');
            
            // Apply CSS filter to the container
            videoWrapper.style.filter = filterString;
        }
    </script>

</body>
</html>
